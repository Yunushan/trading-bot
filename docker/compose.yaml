services:
  trading-bot-service:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    image: trading-bot-service:dev
    container_name: trading-bot-service
    ports:
      - "8000:8000"
    environment:
      BOT_SERVICE_API_TOKEN: ${BOT_SERVICE_API_TOKEN:-}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
