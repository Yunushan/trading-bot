name: Release Linux and macOS Binaries

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_linux:
        description: "Build Linux assets"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS assets (regular runners only)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-linux-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: ${{ matrix.os }}
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_linux == 'true' ||
      github.event.inputs.build_macos == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            platform: linux
            os: ubuntu-24.04
            qt_host: linux
            qt_arch: linux_gcc_64
            artifact_name: linux-x64-release-assets
          - id: linux-arm64
            platform: linux
            os: ubuntu-24.04-arm
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
            artifact_name: linux-arm64-release-assets
          - id: macos-14-arm64
            platform: macos
            os: macos-14
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos14-arm64-release-assets
          - id: macos-15-intel
            platform: macos
            os: macos-15-intel
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos15-intel-release-assets
          - id: macos-15-arm64
            platform: macos
            os: macos-15
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos15-arm64-release-assets
          - id: macos-26-arm64
            platform: macos
            os: macos-26
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos26-arm64-release-assets
    env:
      TB_PLATFORM: ${{ matrix.platform }}
      TB_RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      TB_ASSET_LABEL: ${{ matrix.id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            Languages/Python/requirements.txt
            Languages/Python/pyproject.toml

      - name: Validate tagged release QA sign-off
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_release_qa.py \
            --tag "${{ github.ref_name }}" \
            --note "docs/release-qa/${{ github.ref_name }}.md" \
            --require-current-revision \
            --allow-release-qa-commit

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Refresh README LOC snapshot
        shell: bash
        run: |
          set -euo pipefail
          python tools/update_loc_snapshot.py --readme README.md

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libminizip1t64 \
            libasound2t64 \
            libdbus-1-3 \
            libegl1 \
            libgbm1 \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxcomposite1 \
            libxdamage1 \
            libxdo-dev \
            libxkbcommon-x11-0 \
            libxrandr2 \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            patchelf \
            rpm \
            ruby \
            ruby-dev \
            wget
          sudo gem install --no-document fpm

      - name: Install Qt 6
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.11.0"
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qtwebengine qtwebsockets qtwebchannel qtpositioning
          setup-python: false

      - name: Resolve Qt CMake path
        shell: bash
        run: |
          set -euo pipefail
          qt_prefix="$(qmake -query QT_INSTALL_PREFIX)"
          echo "QT_CMAKE_DIR=${qt_prefix}/lib/cmake/Qt6" >> "${GITHUB_ENV}"

      - name: Install Python dependencies
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.packaging.txt
          python -m pip install --prefer-binary -r requirements.txt

      - name: Build Python binary
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Languages/Python/tools/build_binary.sh
          Languages/Python/tools/build_binary.sh \
            --python python \
            --name Trading-Bot-Python \
            --skip-dependency-install \
            --release-tag "${TB_RELEASE_TAG}"

      - name: Build required Rust binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path experiments/rust-shells/Cargo.toml --locked --release \
            --package trading-bot-rust

      - name: Build required Tauri desktop binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path experiments/rust-shells/Cargo.toml --locked --release \
            --package trading-bot-tauri-desktop

      - name: Configure C++ build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S "experiments/native-cpp" \
                -B "build/binance_cpp" \
                -DCMAKE_BUILD_TYPE=Release \
                -DQt6_DIR="${QT_CMAKE_DIR}" \
                -DTB_REQUIRE_QT_WEBENGINE=ON

      - name: Build C++ binary
        shell: bash
        run: |
          set -euo pipefail
          cmake --build "build/binance_cpp" --config Release --parallel

      - name: Install C++ runtime bundle
        shell: bash
        run: |
          set -euo pipefail
          install_prefix="${GITHUB_WORKSPACE}/release/Trading-Bot-C++"
          rm -rf "${install_prefix}"
          cmake --install "build/binance_cpp" --config Release --prefix "${install_prefix}"

      - name: Smoke packaged native binaries
        shell: bash
        run: |
          set -euo pipefail
          rust_bin="experiments/rust-shells/target/release/trading-bot-rust"
          tauri_bin="experiments/rust-shells/target/release/trading-bot-tauri-desktop"
          if [[ ! -x "${tauri_bin}" ]]; then
            echo "Packaged Tauri executable not found or not executable at ${tauri_bin}" >&2
            exit 1
          fi
          python tools/write_rust_package_smoke_evidence.py \
            --rust-cli "${rust_bin}" \
            --tauri-desktop "${tauri_bin}" \
            --output "release/rust-package-smoke-${{ matrix.id }}.json" \
            --source-revision "${GITHUB_SHA}" \
            --platform "${TB_PLATFORM}" \
            --architecture "$(uname -m)" \
            --require-clean-source

          cpp_root="release/Trading-Bot-C++"
          if [[ "$(uname -s)" == "Darwin" ]]; then
            cpp_bin="${cpp_root}/Trading-Bot-C++.app/Contents/MacOS/Trading-Bot-C++"
          else
            cpp_bin="${cpp_root}/bin/Trading-Bot-C++"
          fi
          if [[ ! -x "${cpp_bin}" ]]; then
            echo "Packaged C++ executable not found or not executable at ${cpp_bin}" >&2
            exit 1
          fi
          QT_QPA_PLATFORM=offscreen "${cpp_bin}" --smoke

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          chmod +x .github/scripts/package_linux_macos_release.sh
          .github/scripts/package_linux_macos_release.sh

      - name: Write and verify artifact digest manifest
        shell: bash
        run: |
          set -euo pipefail
          manifest="release/release-manifest-${{ matrix.id }}.json"
          mapfile -t artifacts < <(find release -maxdepth 1 -type f ! -name 'release-manifest-*.json' -print)
          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No release artifacts were found to include in the digest manifest." >&2
            exit 1
          fi
          python tools/write_release_manifest.py "${artifacts[@]}" --output "${manifest}" --repo-root "${GITHUB_WORKSPACE}"
          python tools/write_release_manifest.py --verify "${manifest}" --repo-root "${GITHUB_WORKSPACE}" --require-current-revision

      - name: Generate SPDX SBOM for release assets
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release
          format: spdx-json
          output-file: release/release-sbom-${{ matrix.id }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release asset provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/*

      - name: Attest release asset SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/*
          sbom-path: release/release-sbom-${{ matrix.id }}.spdx.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  publish-release:
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: "*-release-assets"
          merge-multiple: true
          path: release

      - name: Show release files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah release

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: release/*
