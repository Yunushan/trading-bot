name: Release FreeBSD Binaries

on:
  workflow_dispatch:
    inputs:
      run_freebsd:
        description: "Run FreeBSD self-hosted build"
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-release:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_freebsd == 'true' }}
    runs-on:
      - self-hosted
      - freebsd
    env:
      TB_RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 2

      - name: Validate tagged release QA sign-off
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_release_qa.py \
            --tag "${{ github.ref_name }}" \
            --note "docs/release-qa/${{ github.ref_name }}.md" \
            --require-current-revision \
            --allow-release-qa-commit

      - name: Validate FreeBSD runner prerequisites
        shell: bash
        run: |
          set -euo pipefail
          command -v python3 >/dev/null
          command -v cmake >/dev/null
          command -v c++ >/dev/null || command -v clang++ >/dev/null
          if ! command -v qmake >/dev/null && [[ -z "${Qt6_DIR:-}" && -z "${CMAKE_PREFIX_PATH:-}" ]]; then
            echo "Qt 6 not found. Install Qt and expose qmake or set Qt6_DIR/CMAKE_PREFIX_PATH." >&2
            exit 1
          fi

      - name: Install Python dependencies
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.packaging.txt
          python3 -m pip install -r requirements.txt

      - name: Build Python binary
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Languages/Python/tools/build_binary.sh
          Languages/Python/tools/build_binary.sh \
            --python python3 \
            --name Trading-Bot-Python \
            --skip-dependency-install \
            --release-tag "${TB_RELEASE_TAG}"

      - name: Resolve Qt CMake path
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${Qt6_DIR:-}" ]]; then
            echo "QT_CMAKE_DIR=${Qt6_DIR}" >> "${GITHUB_ENV}"
            exit 0
          fi
          if command -v qmake >/dev/null; then
            qt_prefix="$(qmake -query QT_INSTALL_PREFIX)"
            echo "QT_CMAKE_DIR=${qt_prefix}/lib/cmake/Qt6" >> "${GITHUB_ENV}"
            exit 0
          fi
          echo "QT_CMAKE_DIR=" >> "${GITHUB_ENV}"

      - name: Configure C++ build
        shell: bash
        run: |
          set -euo pipefail
          cmake_args=(
            -S experiments/native-cpp
            -B build/binance_cpp
            -DCMAKE_BUILD_TYPE=Release
            -DTB_REQUIRE_QT_WEBENGINE=OFF
          )
          if [[ -n "${QT_CMAKE_DIR:-}" ]]; then
            cmake_args+=("-DQt6_DIR=${QT_CMAKE_DIR}")
          fi
          cmake "${cmake_args[@]}"

      - name: Build C++ binary
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build/binance_cpp --config Release --parallel

      - name: Install C++ runtime bundle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release/Trading-Bot-C++
          cmake --install build/binance_cpp --config Release --prefix release/Trading-Bot-C++

      - name: Smoke packaged native binary
        shell: bash
        run: |
          set -euo pipefail
          cpp_bin="release/Trading-Bot-C++/bin/Trading-Bot-C++"
          if [[ ! -x "${cpp_bin}" ]]; then
            echo "Packaged C++ executable not found or not executable at ${cpp_bin}" >&2
            exit 1
          fi
          QT_QPA_PLATFORM=offscreen "${cpp_bin}" --smoke

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          arch="$(uname -m)"
          release_version="$(python3 -c 'import os,re; tag=(os.environ.get("TB_RELEASE_TAG") or "").strip(); m=re.search(r"(\d+(?:[._-]\d+){1,3}(?:[-_.]?(?:a|b|rc|post|dev)\d+)?)", tag); print((m.group(1).replace("_",".").replace("-",".") if m else "0.0.0"))')"
          python_bin="Languages/Python/dist/Trading-Bot-Python"
          if [[ ! -f "${python_bin}" ]]; then
            echo "Python binary not found at ${python_bin}" >&2
            exit 1
          fi

          cp "${python_bin}" "release/Trading-Bot-Python-freebsd-${arch}"
          chmod +x "release/Trading-Bot-Python-freebsd-${arch}"
          tar -C release -czf "release/Trading-Bot-Python-freebsd-${arch}-${release_version}.tar.gz" "Trading-Bot-Python-freebsd-${arch}"
          tar -C release -czf "release/Trading-Bot-C++-freebsd-${arch}-${release_version}.tar.gz" "Trading-Bot-C++"

      - name: Write and verify artifact digest manifest
        shell: bash
        run: |
          set -euo pipefail
          manifest="release/release-manifest-freebsd.json"
          mapfile -t artifacts < <(find release -maxdepth 1 -type f ! -name 'release-manifest-*.json' -print)
          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No release artifacts were found to include in the digest manifest." >&2
            exit 1
          fi
          python3 tools/write_release_manifest.py "${artifacts[@]}" --output "${manifest}" --repo-root "${GITHUB_WORKSPACE}"
          python3 tools/write_release_manifest.py --verify "${manifest}" --repo-root "${GITHUB_WORKSPACE}" --require-current-revision

      - name: Generate SPDX SBOM for release assets
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release
          format: spdx-json
          output-file: release/release-sbom-freebsd.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release asset provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/*

      - name: Attest release asset SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/*
          sbom-path: release/release-sbom-freebsd.spdx.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: freebsd-release-assets
          path: release/*
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            release/Trading-Bot-Python-freebsd-*.tar.gz
            release/Trading-Bot-C++-freebsd-*.tar.gz
