name: Rust Native Release Evidence

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub release tag to validate, for example v1.0.33."
        required: true
        type: string
      platform_evidence_run_id:
        description: "Actions run id containing release-platform-evidence-* artifacts. Leave empty to use checked-out release-platform-evidence/ files."
        required: false
        default: ""
        type: string
      platform_evidence_artifact_pattern:
        description: "Artifact name pattern to download from the platform evidence run."
        required: true
        default: "release-platform-evidence-*"
        type: string
      evidence_dir:
        description: "Directory where Rust native runtime evidence artifacts will be written."
        required: true
        default: "artifacts/rust-native-runtime-evidence"
        type: string
      missing_limit:
        description: "Maximum missing platform targets to print during preflight; use 0 for all."
        required: true
        default: "25"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  release-platform-evidence:
    name: Rust Release Platform Evidence
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      PLATFORM_EVIDENCE_ARTIFACT_PATTERN: ${{ inputs.platform_evidence_artifact_pattern }}
      PLATFORM_EVIDENCE_RUN_ID: ${{ inputs.platform_evidence_run_id }}
      RELEASE_TAG: ${{ inputs.tag }}
      RUST_NATIVE_RUNTIME_EVIDENCE_DIR: ${{ github.workspace }}/${{ inputs.evidence_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Validate release evidence inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "tag input is required for Rust native release evidence." >&2
            exit 1
          fi
          if [[ -z "${PLATFORM_EVIDENCE_ARTIFACT_PATTERN}" ]]; then
            echo "platform_evidence_artifact_pattern input is required for Rust native release evidence." >&2
            exit 1
          fi
          if [[ -n "${PLATFORM_EVIDENCE_RUN_ID}" && ! "${PLATFORM_EVIDENCE_RUN_ID}" =~ ^[0-9]+$ ]]; then
            echo "platform_evidence_run_id must be a numeric GitHub Actions run id." >&2
            exit 1
          fi
          if [[ -z "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}" ]]; then
            echo "evidence_dir input is required for Rust native release evidence." >&2
            exit 1
          fi

      - name: Audit native source sync
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/native-source-sync
          python tools/audit_native_source_sync.py --json --output artifacts/native-source-sync/native-source-sync-audit.json

      - name: Upload native source sync audit
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: native-source-sync-audit
          path: artifacts/native-source-sync/native-source-sync-audit.json
          if-no-files-found: warn

      - name: Collect release platform evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-platform-evidence
          if [[ -n "${PLATFORM_EVIDENCE_RUN_ID}" ]]; then
            download_dir="$(mktemp -d)"
            gh run download "${PLATFORM_EVIDENCE_RUN_ID}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${PLATFORM_EVIDENCE_ARTIFACT_PATTERN}" \
              --dir "${download_dir}"
            while IFS= read -r -d '' file; do
              cp "${file}" "release-platform-evidence/$(basename "${file}")"
            done < <(find "${download_dir}" -type f -name '*.json' -print0)
          fi
          evidence_count="$(
            find release-platform-evidence -maxdepth 1 -type f -name '*.json' | wc -l | tr -d ' '
          )"
          echo "Collected ${evidence_count} release platform evidence file(s)."

      - name: Preflight Rust native release evidence inputs
        shell: bash
        run: |
          set -euo pipefail
          python tools/write_rust_native_release_evidence.py \
            --tag "${RELEASE_TAG}" \
            --platform-evidence-dir release-platform-evidence \
            --preflight \
            --missing-limit "${{ inputs.missing_limit }}" \
            --json

      - name: Write Rust native release evidence
        shell: bash
        run: |
          set -euo pipefail
          python tools/write_rust_native_release_evidence.py \
            --tag "${RELEASE_TAG}" \
            --platform-evidence-dir release-platform-evidence \
            --output-dir "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}"

      - name: Validate Rust native release evidence
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_rust_native_runtime_evidence.py \
            --require-evidence \
            --require-current-commit \
            --require-clean-source \
            --evidence-dir "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}" \
            --only rust-native-release-platform-evidence

      - name: Write post-release Rust native runtime evidence plan
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}"
          python tools/audit_rust_native_runtime_readiness.py \
            --json \
            --evidence-dir "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}" \
            --write-evidence-plan "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}/rust-native-runtime-evidence-plan.md"

      - name: Upload Rust native release evidence
        uses: actions/upload-artifact@v7
        with:
          name: rust-native-release-platform-evidence
          path: ${{ inputs.evidence_dir }}/rust-native-release-platform-evidence.json
          if-no-files-found: error

      - name: Upload post-release Rust native runtime evidence plan
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: rust-native-release-platform-evidence-plan
          path: ${{ inputs.evidence_dir }}/rust-native-runtime-evidence-plan.md
          if-no-files-found: warn
