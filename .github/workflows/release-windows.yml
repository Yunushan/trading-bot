name: Release Windows Binaries

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      vcpkg_mode:
        description: "C++ dependency mode"
        type: choice
        options:
          - pinned
          - latest
        default: pinned
      vcpkg_ref:
        description: "vcpkg git ref used when mode=pinned"
        required: false
        default: "d0ba406f0e5352517386709dba49fbabf99a9e3c"
      build_windows_x64:
        description: "Build Windows x64 assets"
        type: boolean
        default: true
      build_windows_arm64:
        description: "Build Windows ARM64 assets"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    permissions:
      contents: read
      id-token: write
      attestations: write
    runs-on: ${{ matrix.os }}
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.build_windows_x64 == 'true' ||
      github.event.inputs.build_windows_arm64 == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            os: windows-latest
            python_arch: x64
            python_requirements: Languages/Python/requirements.txt
            msvc_arch: x64
            vcpkg_triplet: x64-windows
            qt_arch: win64_msvc2022_64
            qt_modules: qtwebengine qtwebsockets qtwebchannel qtpositioning
            cmake_arch: x64
            require_webengine: ON
            asset_suffix: ""
            python_asset: Trading-Bot-Python.exe
            cpp_zip: Trading-Bot-C++.zip
            artifact_name: windows-x64-release-assets
          - id: windows-arm64
            os: windows-11-arm
            python_arch: arm64
            python_requirements: Languages/Python/requirements.windows-arm64.txt
            msvc_arch: ""
            vcpkg_triplet: arm64-windows
            qt_arch: win64_msvc2022_arm64_cross_compiled
            qt_modules: qtwebsockets qtwebchannel qtpositioning
            cmake_arch: ARM64
            require_webengine: OFF
            asset_suffix: -arm64
            python_asset: Trading-Bot-Python-arm64.exe
            cpp_zip: Trading-Bot-C++-arm64.zip
            artifact_name: windows-arm64-release-assets
    env:
      TB_VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      VCPKG_PINNED_REF: "d0ba406f0e5352517386709dba49fbabf99a9e3c"
      VCPKG_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.vcpkg_mode || 'pinned' }}
      VCPKG_REQUESTED_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.vcpkg_ref || '' }}
      TB_RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
      TB_REQUIRE_QT_WEBENGINE: ${{ matrix.require_webengine }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          architecture: ${{ matrix.python_arch }}
          cache: pip
          cache-dependency-path: |
            ${{ matrix.python_requirements }}
            Languages/Python/pyproject.toml

      - name: Validate tagged release QA sign-off
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          python tools/check_release_qa.py `
            --tag "${{ github.ref_name }}" `
            --note "docs/release-qa/${{ github.ref_name }}.md" `
            --require-current-revision `
            --allow-release-qa-commit

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Set up MSVC toolchain
        if: matrix.msvc_arch != ''
        uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install Qt 6 (x64)
        if: matrix.id == 'windows-x64'
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: "6.10.3"
          host: windows
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: ${{ matrix.qt_modules }}
          dir: C:/
          setup-python: false

      - name: Install Qt 6 (arm64)
        if: matrix.id == 'windows-arm64'
        shell: pwsh
        run: |
          python -m pip install --upgrade aqtinstall
          $qtOutputDir = "C:/Qt"
          python -m aqt install-qt windows desktop 6.10.3 win64_msvc2022_arm64_cross_compiled --outputdir $qtOutputDir --modules qtwebsockets qtwebchannel qtpositioning --autodesktop

          $hostQmake = "C:/Qt/6.10.3/msvc2022_64/bin/qmake.exe"
          if (!(Test-Path $hostQmake)) {
            python -m aqt install-qt windows desktop 6.10.3 win64_msvc2022_64 --outputdir $qtOutputDir --archives qtbase qttools
          }

          $qtArm64Bin = "C:/Qt/6.10.3/msvc2022_arm64/bin"
          $qtHostBin = "C:/Qt/6.10.3/msvc2022_64/bin"

          if (Test-Path $qtArm64Bin) {
            $qtArm64Bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          if (Test-Path $qtHostBin) {
            $qtHostBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Resolve Qt CMake path
        shell: pwsh
        run: |
          if ("${{ matrix.id }}" -eq "windows-arm64") {
            $qtPrefix = "C:/Qt/6.10.3/msvc2022_arm64"
            $qtConfig = Join-Path $qtPrefix "lib/cmake/Qt6/Qt6Config.cmake"
            if (!(Test-Path $qtConfig)) {
              throw "Qt6Config.cmake not found for ARM64 kit at $qtConfig"
            }
            $qtHostPath = "C:/Qt/6.10.3/msvc2022_64"
            if (Test-Path (Join-Path $qtHostPath "bin/qmake.exe")) {
              "QT_HOST_PATH=$qtHostPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          } else {
            $qmake = Get-Command qmake -ErrorAction SilentlyContinue
            if (-not $qmake) {
              throw "qmake not found after Qt installation."
            }
            $qtPrefix = (& $qmake.Source -query QT_INSTALL_PREFIX 2>$null | Select-Object -First 1).Trim()
            if ([string]::IsNullOrWhiteSpace($qtPrefix)) {
              throw "Could not resolve QT_INSTALL_PREFIX via qmake."
            }
          }
          "QT_CMAKE_DIR=$qtPrefix/lib/cmake/Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install vcpkg and C++ dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = $env:TB_VCPKG_ROOT
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            throw "TB_VCPKG_ROOT is empty."
          }

          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)
          $vcpkgRootFull = [System.IO.Path]::GetFullPath($vcpkgRoot)
          if (!$vcpkgRootFull.StartsWith($workspace, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Unsafe vcpkg root outside workspace: $vcpkgRootFull"
          }

          if ((Test-Path $vcpkgRoot) -and !(Test-Path "$vcpkgRoot/.git")) {
            Remove-Item -Recurse -Force $vcpkgRoot
          }
          if (!(Test-Path "$vcpkgRoot/.git")) {
            git clone https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
          }

          Push-Location "$vcpkgRoot"
          git fetch --tags --force

          if ($env:VCPKG_MODE -eq "latest") {
            $remoteHead = git symbolic-ref refs/remotes/origin/HEAD
            $branch = ($remoteHead -replace "^refs/remotes/origin/", "").Trim()
            if ([string]::IsNullOrWhiteSpace($branch)) {
              $branch = "master"
            }
            git checkout $branch
            git pull --ff-only origin $branch
            Write-Host "Using latest vcpkg from branch: $branch"
          } else {
            $ref = $env:VCPKG_REQUESTED_REF
            if ([string]::IsNullOrWhiteSpace($ref)) {
              $ref = $env:VCPKG_PINNED_REF
            }
            git checkout $ref
            Write-Host "Using pinned vcpkg ref: $ref"
          }
          Pop-Location

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:VCPKG_ROOT = $vcpkgRoot

          & "$vcpkgRoot/bootstrap-vcpkg.bat" -disableMetrics
          git config --global http.version HTTP/1.1

          function Invoke-WithRetry {
            param(
              [Parameter(Mandatory = $true)][scriptblock]$Action,
              [int]$MaxAttempts = 4,
              [int]$InitialDelaySeconds = 2,
              [string]$Label = "operation"
            )
            $attempt = 1
            while ($attempt -le $MaxAttempts) {
              try {
                & $Action
                return
              } catch {
                if ($attempt -ge $MaxAttempts) {
                  throw
                }
                $delay = [Math]::Min(30, $InitialDelaySeconds * [Math]::Pow(2, $attempt - 1))
                Write-Warning ("{0} failed on attempt {1}/{2}. {3}" -f $Label, $attempt, $MaxAttempts, $_.Exception.Message)
                Write-Host "Retrying in $delay seconds..."
                Start-Sleep -Seconds ([int]$delay)
                $attempt++
              }
            }
          }

          function Prefetch-NlohmannJsonArchive {
            param([string]$Root)
            $portFile = Join-Path $Root "ports/nlohmann-json/portfile.cmake"
            if (!(Test-Path $portFile)) {
              return
            }
            $content = Get-Content -Path $portFile -Raw -ErrorAction SilentlyContinue
            if ([string]::IsNullOrWhiteSpace($content)) {
              return
            }
            if ($content -notmatch 'REF\s+([^\s\)]+)') {
              return
            }
            $ref = $Matches[1].Trim('"')
            if ([string]::IsNullOrWhiteSpace($ref)) {
              return
            }

            $downloadsDir = Join-Path $Root "downloads"
            New-Item -ItemType Directory -Force -Path $downloadsDir | Out-Null
            $archiveName = "nlohmann-json-$ref.tar.gz"
            $archivePath = Join-Path $downloadsDir $archiveName
            if (Test-Path $archivePath) {
              Write-Host "nlohmann-json source archive already present: $archiveName"
              return
            }

            $urls = @(
              "https://github.com/nlohmann/json/archive/$ref.tar.gz",
              "https://codeload.github.com/nlohmann/json/tar.gz/$ref",
              "https://codeload.github.com/nlohmann/json/tar.gz/refs/tags/$ref"
            )
            foreach ($url in $urls) {
              try {
                Invoke-WithRetry -Label "download $archiveName" -MaxAttempts 3 -InitialDelaySeconds 2 -Action {
                  Invoke-WebRequest -Uri $url -OutFile $archivePath -ErrorAction Stop
                  if (!(Test-Path $archivePath) -or (Get-Item $archivePath).Length -le 0) {
                    throw "Downloaded archive is empty."
                  }
                }
                Write-Host "Prefetched nlohmann-json archive from: $url"
                return
              } catch {
                Write-Warning "Failed mirror for nlohmann-json: $url"
              }
            }
            Write-Warning "Could not prefetch nlohmann-json archive; vcpkg will attempt direct download."
          }

          Prefetch-NlohmannJsonArchive -Root $vcpkgRoot

          $packages = @(
            "eigen3:$env:VCPKG_DEFAULT_TRIPLET",
            "xtensor:$env:VCPKG_DEFAULT_TRIPLET",
            "talib:$env:VCPKG_DEFAULT_TRIPLET",
            "cpr:$env:VCPKG_DEFAULT_TRIPLET",
            "curl[tool,ssl]:$env:VCPKG_DEFAULT_TRIPLET",
            "vulkan-headers:$env:VCPKG_DEFAULT_TRIPLET"
          )

          $installed = $false
          $maxInstallAttempts = 3
          for ($installAttempt = 1; $installAttempt -le $maxInstallAttempts; $installAttempt++) {
            & "$vcpkgRoot/vcpkg.exe" --vcpkg-root "$vcpkgRoot" install @packages
            if ($LASTEXITCODE -eq 0) {
              $installed = $true
              break
            }

            if ($installAttempt -lt $maxInstallAttempts) {
              Write-Warning "vcpkg install failed on attempt $installAttempt/$maxInstallAttempts. Preparing retry..."
              Get-ChildItem -Path (Join-Path $vcpkgRoot "downloads") -Filter "nlohmann-json-*.tar.gz" -ErrorAction SilentlyContinue |
                Remove-Item -Force -ErrorAction SilentlyContinue
              Prefetch-NlohmannJsonArchive -Root $vcpkgRoot
              Start-Sleep -Seconds ([int][Math]::Min(30, 5 * $installAttempt))
            }
          }
          if (-not $installed) {
            throw "vcpkg install failed after $maxInstallAttempts attempts."
          }

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Languages/Python/requirements.packaging.txt
          Push-Location Languages/Python
          $requirementsFile = Split-Path -Leaf "${{ matrix.python_requirements }}"
          if ("${{ matrix.id }}" -eq "windows-arm64") {
            $env:AIOHTTP_NO_EXTENSIONS = "1"
            $env:MULTIDICT_NO_EXTENSIONS = "1"
            $env:YARL_NO_EXTENSIONS = "1"
            $env:FROZENLIST_NO_EXTENSIONS = "1"
            $env:PROPCACHE_NO_EXTENSIONS = "1"
          }
          python -m pip install --prefer-binary -r $requirementsFile
          Pop-Location

      - name: Build Python EXE
        shell: pwsh
        run: |
          ./Languages/Python/tools/build_exe.ps1 -Python python -Name "Trading-Bot-Python" -SkipDependencyInstall -ReleaseTag "$env:TB_RELEASE_TAG"

      - name: Build required Rust EXE
        shell: pwsh
        run: |
          $rustBuildArgs = @(
            "--manifest-path", "experiments/rust-shells/Cargo.toml",
            "--locked",
            "--release",
            "--package", "trading-bot-rust"
          )
          cargo build @rustBuildArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Required Rust package build failed: trading-bot-rust"
          }

      - name: Build required Tauri desktop EXE
        shell: pwsh
        run: |
          $rustBuildArgs = @(
            "--manifest-path", "experiments/rust-shells/Cargo.toml",
            "--locked",
            "--release",
            "--package", "trading-bot-tauri-desktop"
          )
          cargo build @rustBuildArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Required Rust package build failed: trading-bot-tauri-desktop"
          }

      - name: Configure C++ build
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-S", "experiments/native-cpp",
            "-B", "build/binance_cpp",
            "-A", "${{ matrix.cmake_arch }}",
            "-DQt6_DIR=$env:QT_CMAKE_DIR",
            "-DTB_REQUIRE_QT_WEBENGINE=$env:TB_REQUIRE_QT_WEBENGINE"
          )
          if ("${{ matrix.id }}" -eq "windows-arm64" -and -not [string]::IsNullOrWhiteSpace($env:QT_HOST_PATH)) {
            $cmakeArgs += "-DQT_HOST_PATH=$env:QT_HOST_PATH"
          }
          cmake @cmakeArgs

      - name: Build C++ EXE
        shell: pwsh
        run: |
          cmake --build "build/binance_cpp" --config Release --parallel

      - name: Package release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $releaseTag = "$env:TB_RELEASE_TAG".Trim()
          $releaseVersion = "0.0.0"
          if (-not [string]::IsNullOrWhiteSpace($releaseTag)) {
            if ($releaseTag -match "(\d+(?:[._-]\d+){1,3}(?:[-_.]?(?:a|b|rc|post|dev)\d+)?)") {
              $releaseVersion = $Matches[1].Replace("_", ".")
              $releaseTag = $releaseVersion
            }
          }

          $pythonExe = "Languages/Python/dist/Trading-Bot-Python.exe"
          if (!(Test-Path $pythonExe)) {
            throw "Python executable not found after build."
          }

          $assetTag = "${{ matrix.id }}".Trim()
          if ([string]::IsNullOrWhiteSpace($assetTag)) {
            $assetTag = "windows"
          }

          $pythonExeAsset = "release/Trading-Bot-Python-$assetTag-$releaseVersion.exe"
          Copy-Item $pythonExe $pythonExeAsset

          $rustAssets = @(
            @{ AssetPrefix = "Trading-Bot-Rust"; BinaryName = "trading-bot-rust"; Required = $true },
            @{ AssetPrefix = "Trading-Bot-Rust-tauri"; BinaryName = "trading-bot-tauri-desktop"; Required = $true }
          )
          foreach ($rustAsset in $rustAssets) {
            $rustExe = "experiments/rust-shells/target/release/$($rustAsset.BinaryName).exe"
            if (!(Test-Path $rustExe)) {
              throw "Required Rust executable not found after build: $rustExe"
            }
            $rustExeAsset = "release/$($rustAsset.AssetPrefix)-$assetTag-$releaseVersion.exe"
            Copy-Item $rustExe $rustExeAsset
          }

          $cppExe = "build/binance_cpp/Release/Trading-Bot-C++.exe"
          if (!(Test-Path $cppExe)) {
            $cppExe = "build/binance_cpp/Release/binance_backtest_tab.exe"
          }
          if (!(Test-Path $cppExe)) {
            $cppExe = "build/binance_cpp/Trading-Bot-C++.exe"
          }
          if (!(Test-Path $cppExe)) {
            $cppExe = "build/binance_cpp/binance_backtest_tab.exe"
          }
          if (!(Test-Path $cppExe)) {
            throw "C++ executable not found after build."
          }

          $cppBundleDir = "release/Trading-Bot-C++${{ matrix.asset_suffix }}"
          New-Item -ItemType Directory -Force -Path $cppBundleDir | Out-Null
          Copy-Item $cppExe (Join-Path $cppBundleDir "Trading-Bot-C++.exe")

          $windeployqtCandidates = @()
          if ("${{ matrix.id }}" -eq "windows-arm64") {
            $windeployqtCandidates += "C:/Qt/6.10.3/msvc2022_arm64/bin/windeployqt.exe"
            $windeployqtCandidates += "C:/Qt/6.10.3/msvc2022_64/bin/windeployqt.exe"
          }
          $windeployqt = Get-Command windeployqt -ErrorAction SilentlyContinue
          if ($windeployqt) {
            $windeployqtCandidates += $windeployqt.Source
          }
          $windeployqtPath = $windeployqtCandidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($windeployqtPath)) {
            throw "windeployqt not found on PATH or expected Qt bin directories."
          }
          & $windeployqtPath --release --compiler-runtime (Join-Path $cppBundleDir "Trading-Bot-C++.exe")
          if ($LASTEXITCODE -ne 0) {
            throw "windeployqt failed with exit code $LASTEXITCODE."
          }
          $compilerRuntimeArchitecture = if ("${{ matrix.id }}" -eq "windows-arm64") {
            "arm64"
          } else {
            "x64"
          }
          & ./tools/Copy-MsvcRuntimeToBundle.ps1 `
            -BundleDir $cppBundleDir `
            -Architecture $compilerRuntimeArchitecture

          if (-not [string]::IsNullOrWhiteSpace($releaseTag)) {
            $releaseInfoPath = Join-Path $cppBundleDir "release-info.json"
            $releaseInfoPayload = @{
              release_tag = $releaseTag
              built_at_utc = (Get-Date).ToUniversalTime().ToString("o")
            } | ConvertTo-Json -Depth 4
            Set-Content -Path $releaseInfoPath -Value $releaseInfoPayload -Encoding utf8
          }

          function Get-VcpkgInstalledVersion {
            param(
              [string]$VcpkgRoot,
              [string[]]$PackageNames
            )
            if ([string]::IsNullOrWhiteSpace($VcpkgRoot) -or $null -eq $PackageNames -or $PackageNames.Count -eq 0) {
              return ""
            }
            $statusPath = Join-Path $VcpkgRoot "installed/vcpkg/status"
            if (!(Test-Path $statusPath)) {
              return ""
            }
            $statusRaw = Get-Content -Path $statusPath -Raw -ErrorAction SilentlyContinue
            if ([string]::IsNullOrWhiteSpace($statusRaw)) {
              return ""
            }
            $blocks = [regex]::Split($statusRaw.Trim(), "\r?\n\r?\n+")
            foreach ($packageName in $PackageNames) {
              if ([string]::IsNullOrWhiteSpace($packageName)) {
                continue
              }
              $needle = [regex]::Escape($packageName.Trim())
              foreach ($block in $blocks) {
                if ([string]::IsNullOrWhiteSpace($block)) {
                  continue
                }
                if ($block -notmatch "(?m)^Package:\s*$needle\s*$") {
                  continue
                }
                $version = ""
                if ($block -match "(?m)^Version(?:-[A-Za-z]+)?:\s*([^\r\n]+)\s*$") {
                  $version = "$($Matches[1])".Trim()
                }
                $portVersion = ""
                if ($block -match "(?m)^Port-Version:\s*([^\r\n]+)\s*$") {
                  $portVersion = "$($Matches[1])".Trim()
                }
                if ([string]::IsNullOrWhiteSpace($version)) {
                  continue
                }
                if (-not [string]::IsNullOrWhiteSpace($portVersion) -and $portVersion -ne "0") {
                  return "$version#$portVersion"
                }
                return $version
              }
            }
            return ""
          }

          $qtVersion = ""
          try {
            $qmake = Get-Command qmake -ErrorAction SilentlyContinue
            if ($qmake) {
              $qtVersion = (& $qmake.Source -query QT_VERSION 2>$null | Select-Object -First 1).Trim()
            }
          } catch {
            $qtVersion = ""
          }
          if ([string]::IsNullOrWhiteSpace($qtVersion)) {
            $qtVersion = "6.10.3"
          }

          $nativeClientVersion = if ([string]::IsNullOrWhiteSpace($releaseTag)) { "Unknown" } else { $releaseTag }
          $vcpkgRootForManifest = "$env:TB_VCPKG_ROOT"
          $eigenVersion = Get-VcpkgInstalledVersion -VcpkgRoot $vcpkgRootForManifest -PackageNames @("eigen3")
          $xtensorVersion = Get-VcpkgInstalledVersion -VcpkgRoot $vcpkgRootForManifest -PackageNames @("xtensor")
          $talibVersion = Get-VcpkgInstalledVersion -VcpkgRoot $vcpkgRootForManifest -PackageNames @("talib")
          $curlVersion = Get-VcpkgInstalledVersion -VcpkgRoot $vcpkgRootForManifest -PackageNames @("curl")
          $cprVersion = Get-VcpkgInstalledVersion -VcpkgRoot $vcpkgRootForManifest -PackageNames @("cpr")
          $eigenInstalled = if ([string]::IsNullOrWhiteSpace($eigenVersion)) { "Unknown" } else { $eigenVersion }
          $xtensorInstalled = if ([string]::IsNullOrWhiteSpace($xtensorVersion)) { "Unknown" } else { $xtensorVersion }
          $talibInstalled = if ([string]::IsNullOrWhiteSpace($talibVersion)) { "Unknown" } else { $talibVersion }
          $curlInstalled = if ([string]::IsNullOrWhiteSpace($curlVersion)) { "Unknown" } else { $curlVersion }
          $cprInstalled = if ([string]::IsNullOrWhiteSpace($cprVersion)) { "Unknown" } else { $cprVersion }

          $cppDeps = @(
            @{ name = "Qt6 (C++)"; installed = $qtVersion },
            @{ name = "Qt6 Network (REST)"; installed = $qtVersion },
            @{ name = "Qt6 WebEngine"; installed = $qtVersion },
            @{ name = "Qt6 WebSockets"; installed = $qtVersion },
            @{ name = "Binance REST client (native)"; installed = $nativeClientVersion },
            @{ name = "Binance WebSocket client (native)"; installed = $nativeClientVersion },
            @{ name = "Eigen"; installed = $eigenInstalled },
            @{ name = "xtensor"; installed = $xtensorInstalled },
            @{ name = "TA-Lib"; installed = $talibInstalled },
            @{ name = "libcurl"; installed = $curlInstalled },
            @{ name = "cpr"; installed = $cprInstalled }
          )
          $cppDepsPath = Join-Path $cppBundleDir "cpp-deps.json"
          $cppDepsPayload = @{
            release_tag = $releaseTag
            built_at_utc = (Get-Date).ToUniversalTime().ToString("o")
            dependencies = $cppDeps
          } | ConvertTo-Json -Depth 6
          Set-Content -Path $cppDepsPath -Value $cppDepsPayload -Encoding utf8

          $cppZipAsset = "release/Trading-Bot-C++-$assetTag-$releaseVersion.zip"
          Compress-Archive -Path "$cppBundleDir/*" -DestinationPath $cppZipAsset -Force

      - name: Smoke packaged native binaries
        shell: pwsh
        run: |
          $rustCliAssets = @(
            Get-ChildItem -Path release -Filter "Trading-Bot-Rust-${{ matrix.id }}-*.exe" -File
          )
          $tauriAssets = @(
            Get-ChildItem -Path release -Filter "Trading-Bot-Rust-tauri-${{ matrix.id }}-*.exe" -File
          )
          if ($rustCliAssets.Count -ne 1) {
            throw "Expected exactly one packaged Rust CLI asset; found $($rustCliAssets.Count)."
          }
          if ($tauriAssets.Count -ne 1) {
            throw "Expected exactly one packaged Tauri asset; found $($tauriAssets.Count)."
          }
          $rustArchitecture = if ("${{ matrix.id }}" -eq "windows-arm64") { "arm64" } else { "x64" }
          $rustSmokeEvidence = "release/rust-package-smoke-${{ matrix.id }}.json"
          & python tools/write_rust_package_smoke_evidence.py `
            --rust-cli $rustCliAssets[0].FullName `
            --tauri-desktop $tauriAssets[0].FullName `
            --output $rustSmokeEvidence `
            --source-revision "${{ github.sha }}" `
            --platform windows `
            --architecture $rustArchitecture `
            --require-clean-source
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged Rust evidence failed with exit code $LASTEXITCODE."
          }

          $cppExe = "release/Trading-Bot-C++${{ matrix.asset_suffix }}/Trading-Bot-C++.exe"
          if (!(Test-Path $cppExe)) {
            throw "Packaged C++ executable not found at $cppExe"
          }
          $cppArchitecture = if ("${{ matrix.id }}" -eq "windows-arm64") {
            "arm64"
          } else {
            "x64"
          }
          $cppSmokeEvidence = "release/native-cpp-windows-smoke-${{ matrix.id }}.json"
          & ./tools/Test-NativeCppWindowsBundle.ps1 `
            -BundleDir (Split-Path $cppExe -Parent) `
            -RequireCompilerRuntime `
            -Architecture $cppArchitecture `
            -EvidencePath $cppSmokeEvidence `
            -SourceRevision "${{ github.sha }}"

      - name: Write and verify artifact digest manifest
        shell: pwsh
        run: |
          $manifest = "release/release-manifest-${{ matrix.id }}.json"
          $artifacts = @(Get-ChildItem -Path release -File | Where-Object { $_.Name -notlike "release-manifest-*.json" })
          if ($artifacts.Count -eq 0) {
            throw "No release artifacts were found to include in the digest manifest."
          }
          & python tools/write_release_manifest.py @($artifacts.FullName) --output $manifest --repo-root $env:GITHUB_WORKSPACE
          if ($LASTEXITCODE -ne 0) {
            throw "Release manifest generation failed with exit code $LASTEXITCODE."
          }
          & python tools/write_release_manifest.py --verify $manifest --repo-root $env:GITHUB_WORKSPACE --require-current-revision
          if ($LASTEXITCODE -ne 0) {
            throw "Release manifest verification failed with exit code $LASTEXITCODE."
          }

      - name: Generate SPDX SBOM for release assets
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release
          format: spdx-json
          output-file: release/release-sbom-${{ matrix.id }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release asset provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/*

      - name: Attest release asset SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/*
          sbom-path: release/release-sbom-${{ matrix.id }}.spdx.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/Trading-Bot-Python*.exe
            release/Trading-Bot-Rust*.exe
            release/Trading-Bot-C++*.zip
            release/native-cpp-windows-smoke-*.json
            release/rust-package-smoke-*.json
            release/release-manifest-*.json
            release/release-sbom-*.spdx.json
          if-no-files-found: error

  publish-release:
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: windows-*-release-assets
          merge-multiple: true
          path: release

      - name: Show release files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: true
          files: release/*
