name: Rust Native Live Smoke Evidence

on:
  workflow_dispatch:
    inputs:
      binance_testnet:
        description: "Use Binance futures testnet for the read-only signed smoke."
        required: true
        default: true
        type: boolean
      symbol:
        description: "Symbol for the market-data portion of the smoke."
        required: true
        default: "BTCUSDT"
        type: string
      interval:
        description: "Kline interval for the market-data portion of the smoke."
        required: true
        default: "1m"
        type: string
      evidence_dir:
        description: "Directory where Rust native runtime evidence artifacts will be written."
        required: true
        default: "artifacts/rust-native-runtime-evidence"
        type: string

permissions:
  contents: read

jobs:
  signed-account-read-smoke:
    name: Signed Account Read Smoke
    runs-on: ubuntu-24.04
    env:
      BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
      BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
      BINANCE_LIVE_SMOKE_INTERVAL: ${{ inputs.interval }}
      BINANCE_LIVE_SMOKE_SYMBOL: ${{ inputs.symbol }}
      BINANCE_TESTNET: "${{ inputs.binance_testnet }}"
      RUST_NATIVE_RUNTIME_EVIDENCE_DIR: ${{ github.workspace }}/${{ inputs.evidence_dir }}
      TRADING_BOT_RUST_LIVE_SMOKE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install native parity dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./Languages/Python"

      - name: Validate signed smoke inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${BINANCE_LIVE_SMOKE_SYMBOL}" ]]; then
            echo "symbol input is required for Rust native live smoke evidence." >&2
            exit 1
          fi
          if [[ -z "${BINANCE_LIVE_SMOKE_INTERVAL}" ]]; then
            echo "interval input is required for Rust native live smoke evidence." >&2
            exit 1
          fi
          if [[ -z "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}" ]]; then
            echo "evidence_dir input is required for Rust native live smoke evidence." >&2
            exit 1
          fi

      - name: Install Rust native smoke dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            experiments/rust-shells -> target

      - name: Audit native source sync
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/native-source-sync
          python tools/audit_native_source_sync.py --json --output artifacts/native-source-sync/native-source-sync-audit.json

      - name: Upload native source sync audit
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-source-sync-audit
          path: artifacts/native-source-sync/native-source-sync-audit.json
          if-no-files-found: warn

      - name: Validate Rust native live-smoke preflight
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_rust_native_live_smoke_preflight.py --json --timeout 180

      - name: Run guarded signed account-read smoke
        shell: bash
        working-directory: experiments/rust-shells
        run: |
          set -euo pipefail
          if [[ -z "${BINANCE_API_KEY}" || -z "${BINANCE_API_SECRET}" ]]; then
            echo "BINANCE_API_KEY and BINANCE_API_SECRET repository secrets are required for Rust signed account-read smoke." >&2
            exit 1
          fi
          cargo run -p trading-bot-rust -- --native-live-smoke-preflight
          cargo run -p trading-bot-rust -- --native-live-smoke

      - name: Validate signed account-read smoke evidence
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_rust_native_runtime_evidence.py \
            --require-evidence \
            --require-current-commit \
            --require-clean-source \
            --evidence-dir "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}" \
            --only rust-native-live-market-data-smoke \
            --only rust-native-live-account-read-smoke

      - name: Write post-smoke Rust native runtime evidence plan
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}"
          python tools/audit_rust_native_runtime_readiness.py \
            --json \
            --evidence-dir "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}" \
            --write-evidence-plan "${RUST_NATIVE_RUNTIME_EVIDENCE_DIR}/rust-native-runtime-evidence-plan.md"

      - name: Upload signed account-read smoke evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-native-live-smoke-evidence
          path: |
            ${{ inputs.evidence_dir }}/rust-native-live-market-data-smoke.json
            ${{ inputs.evidence_dir }}/rust-native-live-account-read-smoke.json
          if-no-files-found: error

      - name: Upload post-smoke Rust native runtime evidence plan
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-native-live-smoke-evidence-plan
          path: ${{ inputs.evidence_dir }}/rust-native-runtime-evidence-plan.md
          if-no-files-found: warn
