name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Lint GitHub workflows
        shell: bash
        run: |
          set -euo pipefail
          actionlint -color

  python-quality:
    name: Python Quality
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            Languages/Python/pyproject.toml

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./Languages/Python[desktop,service,dev]"

      - name: Clean generated Python install artifacts
        shell: bash
        run: |
          set -euo pipefail
          python tools/clean_workspace_artifacts.py --apply

      - name: Install Linux Qt runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libopengl0 \
            libxcomposite1 \
            libxdamage1 \
            libxkbcommon-x11-0 \
            libxrandr2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_python_sources_compile.py apps/desktop-pyqt/main.py apps/service-api/main.py Languages/Python/app Languages/Python/trading_core Languages/Python/main.py Languages/Python/tools tools

      - name: Check runtime tool versions
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_local_tool_versions.py --strict --skip-node

      - name: Check workspace artifact hygiene
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_workspace_hygiene.py --fail-on-noisy

      - name: Lint Python workspace
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check --config Languages/Python/pyproject.toml Languages/Python

      - name: Check risky-pattern baseline
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_risky_patterns.py \
            --baseline tools/risky_patterns_baseline.json \
            --fail-on-regression \
            --fail-on-high

      - name: Check unsupported support claims
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_support_claims.py

      - name: Audit native source sync
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_native_source_sync.py --json

      - name: Check Rust native runtime evidence contract
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_rust_native_runtime_evidence.py --schema-only

      - name: Check Rust native evidence workflow contracts
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_rust_native_evidence_workflows.py --json

      - name: Check generated evidence source-control guard
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_generated_evidence_source_control.py --json

      - name: Audit Rust native evidence importer
        shell: bash
        run: |
          set -euo pipefail
          python tools/import_rust_native_evidence_artifacts.py \
            artifacts/rust-native-runtime-evidence \
            release-platform-evidence \
            --require-current-commit \
            --require-clean-source \
            --json

      - name: Audit Rust native runtime promotion readiness
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python tools/audit_rust_native_runtime_readiness.py \
            --json \
            --write-evidence-plan artifacts/rust-native-runtime-evidence-plan.md

      - name: Upload Rust native runtime evidence plan
        uses: actions/upload-artifact@v7
        with:
          name: rust-native-runtime-evidence-plan
          path: artifacts/rust-native-runtime-evidence-plan.md
          if-no-files-found: error

      - name: Check hardening article evidence
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_hardening_articles.py

      - name: Check Python dependency metadata
        shell: bash
        run: |
          set -euo pipefail
          python Languages/Python/tools/check_dependency_metadata.py
          python tools/check_python_version_support.py --current

      - name: Check service API contract artifacts
        shell: bash
        run: |
          set -euo pipefail
          python Languages/Python/tools/check_service_api_contracts.py

      - name: Run focused service API tests
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python tools/run_service_tests.py --check-list
          python tools/run_service_tests.py --check-docs
          python tools/run_service_tests.py

      - name: Type-check configured Python targets
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python -m mypy --config-file pyproject.toml

      - name: Smoke-check canonical service launcher
        shell: bash
        run: |
          set -euo pipefail
          python apps/service-api/main.py --healthcheck

      - name: Dry-run release smoke plan
        shell: bash
        run: |
          set -euo pipefail
          python tools/release_smoke.py --dry-run --skip-full-tests --manual-smoke-mode skip

      - name: Run manual desktop/service smoke
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python tools/manual_smoke.py --json

      - name: Run Python smoke tests
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python tools/run_python_tests.py --runner pytest

  python-version-compatibility:
    name: Python 3.10-3.14 Compatibility (${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            Languages/Python/pyproject.toml

      - name: Install Python compatibility dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./Languages/Python[service,dev]"

      - name: Validate Python version support metadata
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_python_version_support.py --current
          python Languages/Python/tools/check_dependency_metadata.py

      - name: Compile service/core compatibility surface
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_python_sources_compile.py apps/service-api/main.py Languages/Python/app/service Languages/Python/app/settings Languages/Python/app/integrations/llm Languages/Python/trading_core Languages/Python/tools tools

      - name: Run focused compatibility tests
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python -m unittest \
            tests.test_settings_defaults \
            tests.test_service_config_runtime \
            tests.test_service_schema_contracts \
            tests.test_llm_clients_privacy \
            tests.test_llm_local_models

  web-dashboard-quality:
    name: Web Dashboard Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check dashboard JavaScript syntax
        shell: bash
        working-directory: apps/web-dashboard
        run: |
          set -euo pipefail
          node --check modules/render.js
          node --check modules/state.js
          node --check tests/render-preflight.test.mjs

      - name: Check Node.js version
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_local_tool_versions.py --strict --skip-python

      - name: Run dashboard behavior tests
        shell: bash
        working-directory: apps/web-dashboard
        run: |
          set -euo pipefail
          npm test

  mobile-client-quality:
    name: Mobile Client Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check Node.js version
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_local_tool_versions.py --strict --skip-python

      - name: Run mobile client contract tests
        shell: bash
        working-directory: apps/mobile-client
        run: |
          set -euo pipefail
          npm test

  cross-platform-support-smoke:
    name: Cross-Platform Support Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            Languages/Python/pyproject.toml

      - name: Install cross-platform Python service dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./Languages/Python[service]"

      - name: Compile core service support surface
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_python_sources_compile.py apps/service-api/main.py Languages/Python/app/service Languages/Python/app/settings Languages/Python/trading_core

      - name: Smoke-check canonical service launcher
        shell: bash
        run: |
          set -euo pipefail
          python apps/service-api/main.py --healthcheck

  release-platform-matrix-contract:
    name: Release Platform Matrix Contract
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Validate release platform/browser matrix
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_release_platform_matrix.py --schema-only

  native-cpp-smoke:
    name: Native C++ Smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Linux C++/Qt dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgl1-mesa-dev \
            qt6-base-dev \
            qt6-base-dev-tools

      - name: Configure, build, and test native C++ smoke surface
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_native_cpp.py \
            --no-require-webengine \
            --no-enable-qt-deploy-script \
            --smoke-targets-only \
            --qt-version 6.4.0 \
            --build-dir build/binance_cpp_ci

  rust-smoke:
    name: Rust Smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux Rust desktop dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            experiments/rust-shells -> target

      - name: Check Rust workspace
        shell: bash
        working-directory: experiments/rust-shells
        run: |
          set -euo pipefail
          cargo check --workspace

      - name: Test Rust core hardening contracts
        shell: bash
        working-directory: experiments/rust-shells
        run: |
          set -euo pipefail
          cargo test -p trading-bot-core

      - name: Validate Rust native live-smoke preflight
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_rust_native_live_smoke_preflight.py --json

      - name: Validate Rust native local recovery evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_rust_native_local_recovery_evidence.py --json

      - name: Run Tauri UI behavior tests
        shell: bash
        run: |
          set -euo pipefail
          node experiments/rust-shells/apps/tauri-desktop/ui/tauri-ui-behavior.test.cjs
