name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Lint GitHub workflows
        shell: bash
        run: |
          set -euo pipefail
          actionlint -color

  python-quality:
    name: Python Quality
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            Languages/Python/pyproject.toml

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./Languages/Python[desktop,service,dev]"

      - name: Install Linux Qt runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libopengl0 \
            libxcomposite1 \
            libxdamage1 \
            libxkbcommon-x11-0 \
            libxrandr2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall apps/desktop-pyqt/main.py apps/service-api/main.py Languages/Python/app Languages/Python/trading_core Languages/Python/main.py Languages/Python/tools tools

      - name: Check runtime tool versions
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_local_tool_versions.py --strict --skip-node

      - name: Check workspace artifact hygiene
        shell: bash
        run: |
          set -euo pipefail
          python tools/audit_workspace_hygiene.py --fail-on-noisy

      - name: Lint Python workspace
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check --config Languages/Python/pyproject.toml Languages/Python

      - name: Check Python dependency metadata
        shell: bash
        run: |
          set -euo pipefail
          python Languages/Python/tools/check_dependency_metadata.py

      - name: Check service API contract artifacts
        shell: bash
        run: |
          set -euo pipefail
          python Languages/Python/tools/check_service_api_contracts.py

      - name: Run focused service API tests
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python tools/run_service_tests.py --check-list
          python tools/run_service_tests.py --check-docs
          python tools/run_service_tests.py

      - name: Type-check configured Python targets
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python -m mypy --config-file pyproject.toml

      - name: Smoke-check canonical service launcher
        shell: bash
        run: |
          set -euo pipefail
          python apps/service-api/main.py --healthcheck

      - name: Run manual desktop/service smoke
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python tools/manual_smoke.py --json

      - name: Run Python smoke tests
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python -m pytest

  web-dashboard-quality:
    name: Web Dashboard Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check dashboard JavaScript syntax
        shell: bash
        working-directory: apps/web-dashboard
        run: |
          set -euo pipefail
          node --check modules/render.js
          node --check modules/state.js
          node --check tests/render-preflight.test.mjs

      - name: Check Node.js version
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_local_tool_versions.py --strict --skip-python

      - name: Run dashboard behavior tests
        shell: bash
        working-directory: apps/web-dashboard
        run: |
          set -euo pipefail
          npm test

  mobile-client-quality:
    name: Mobile Client Quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check Node.js version
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/check_local_tool_versions.py --strict --skip-python

      - name: Run mobile client contract tests
        shell: bash
        working-directory: apps/mobile-client
        run: |
          set -euo pipefail
          npm test

  cross-platform-support-smoke:
    name: Cross-Platform Support Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025
          - macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile core service support surface
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall apps/service-api/main.py Languages/Python/app/service Languages/Python/app/settings Languages/Python/trading_core

      - name: Smoke-check canonical service launcher
        shell: bash
        run: |
          set -euo pipefail
          python apps/service-api/main.py --healthcheck

  rust-smoke:
    name: Rust Smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux Rust desktop dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            experiments/rust-shells -> target

      - name: Check Rust workspace
        shell: bash
        working-directory: experiments/rust-shells
        run: |
          set -euo pipefail
          cargo check --workspace
