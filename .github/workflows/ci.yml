name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Lint GitHub workflows
        shell: bash
        run: |
          set -euo pipefail
          actionlint -color

  python-smoke:
    name: Python Smoke
    runs-on: ubuntu-24.04
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            Languages/Python/pyproject.toml

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./Languages/Python[desktop,service,dev]"

      - name: Install Linux Qt runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libdbus-1-3 \
            libegl1 \
            libfontconfig1 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libopengl0 \
            libxcomposite1 \
            libxdamage1 \
            libxkbcommon-x11-0 \
            libxrandr2 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall apps/desktop-pyqt/main.py apps/service-api/main.py Languages/Python/app Languages/Python/trading_core Languages/Python/main.py tools

      - name: Lint product entrypoints
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check --config Languages/Python/pyproject.toml \
            apps/desktop-pyqt/main.py \
            apps/service-api/main.py \
            Languages/Python/main.py \
            Languages/Python/app/service/main.py \
            Languages/Python/app/service/api/app.py \
            Languages/Python/app/desktop/bootstrap/main.py \
            Languages/Python/trading_core \
            Languages/Python/tests/test_product_app_entrypoints.py \
            Languages/Python/tests/test_product_packaging_contract.py \
            Languages/Python/tests/test_trading_core_contract.py

      - name: Type-check product entrypoints
        shell: bash
        run: |
          set -euo pipefail
          python -m mypy --config-file Languages/Python/pyproject.toml \
            Languages/Python/main.py \
            Languages/Python/app/entrypoint_contract.py \
            Languages/Python/app/desktop/product_main.py \
            Languages/Python/app/desktop/bootstrap/main.py \
            Languages/Python/app/service/main.py \
            Languages/Python/app/service/product_main.py \
            Languages/Python/app/service/api/app.py \
            Languages/Python/trading_core/__init__.py \
            Languages/Python/trading_core/backtest.py \
            Languages/Python/trading_core/indicators.py \
            Languages/Python/trading_core/positions.py \
            Languages/Python/trading_core/strategy.py

      - name: Smoke-check canonical service launcher
        shell: bash
        run: |
          set -euo pipefail
          python apps/service-api/main.py --healthcheck

      - name: Run Python smoke tests
        shell: bash
        working-directory: Languages/Python
        run: |
          set -euo pipefail
          python -m pytest

  rust-smoke:
    name: Rust Smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux Rust desktop dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            experiments/rust-shells -> target

      - name: Check Rust workspace
        shell: bash
        working-directory: experiments/rust-shells
        run: |
          set -euo pipefail
          cargo check --workspace
