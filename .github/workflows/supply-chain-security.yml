name: Supply Chain Security

on:
  pull_request:
    paths:
      - "Languages/Python/**"
      - "apps/web-dashboard/**"
      - "apps/mobile-client/**"
      - "experiments/rust-shells/**"
      - "docker/**"
      - ".github/dependabot.yml"
      - ".github/workflows/supply-chain-security.yml"
  push:
    branches: [main]
    paths:
      - "Languages/Python/**"
      - "apps/web-dashboard/**"
      - "apps/mobile-client/**"
      - "experiments/rust-shells/**"
      - "docker/**"
      - ".github/dependabot.yml"
      - ".github/workflows/supply-chain-security.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-vulnerability-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: Languages/Python/pyproject.toml

      - name: Install production Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e "./Languages/Python[service,security]"

      - name: Audit Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python tools/run_python_security_audit.py --skip-editable --progress-spinner=off

  node-vulnerability-audit:
    name: Node Dependency Audit (${{ matrix.client }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        client:
          - apps/web-dashboard
          - apps/mobile-client
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.client }}/package-lock.json

      - name: Install production Node dependencies
        shell: bash
        working-directory: ${{ matrix.client }}
        run: |
          set -euo pipefail
          npm ci --omit=dev

      - name: Audit production Node dependencies
        shell: bash
        working-directory: ${{ matrix.client }}
        run: |
          set -euo pipefail
          npm audit --omit=dev --audit-level=high

  rust-vulnerability-audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Install pinned cargo-audit
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit Rust dependencies
        shell: bash
        working-directory: experiments/rust-shells
        run: |
          set -euo pipefail
          cargo audit --file Cargo.lock

  container-vulnerability-audit:
    name: Container Image Audit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build service container image
        shell: bash
        run: |
          set -euo pipefail
          docker build --pull --file docker/backend.Dockerfile --tag trading-bot-service:supply-chain .

      - name: Audit service container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: trading-bot-service:supply-chain
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: HIGH,CRITICAL
          scanners: vuln
