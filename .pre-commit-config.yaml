repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.11
    hooks:
      - id: ruff-check
        files: ^(apps/(desktop-pyqt|service-api)/.*\.py|Languages/Python/(app|tests|tools|trading_core)/.*\.py|Languages/Python/main\.py|tools/.*\.py)$
        args: ["--config", "Languages/Python/pyproject.toml"]
      - id: ruff-format
        files: ^(apps/(desktop-pyqt|service-api)/.*\.py|Languages/Python/(app|tests|tools|trading_core)/.*\.py|Languages/Python/main\.py|tools/.*\.py)$
        args: ["--config", "Languages/Python/pyproject.toml"]
